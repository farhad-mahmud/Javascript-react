          function functionOne() {
             console.log('hello');
              console.log(2 + 2);
          } 

        functionOne();
        
        // anonymous function.. 
        const function2 = function() {
                  console.log('this is a anonymous function');

         };

           const arrowFunction = () => {
                console.log('this is arrow function') ;

           }

               console.log( name + " is sleeping ") ;
