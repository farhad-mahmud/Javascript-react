<!DOCTYPE html>
<html>
    <head>
         <title> Functions </title>
    </head>
    <body>
         <script> // javascript code.. 
            // objects can contain other objects as well as functions..

            const product = {
                  name : 'a',

                  rating : {
                      stars : 4.5,
                      count : 87
                  }, 
                  fun : function function_one(){
                       console.log('function inside object');

                  }
            };

            console.log(product.rating.count);
            product.fun();

            // object shortcuts..

            const object4 = { msg : 'gg' , price : 80};
            // 1. Destructuring (taking properties out of an object)
            const { message, price } = object4; 
            
            // // 2. Shorthand Property (if property name and variable name match)

                const obj5 = {
                      msg 
                };

                const obj6 = {
                      method() {
                          console.log('method') ;
                      }
                }
             
         </script>
    </body>
</html>
